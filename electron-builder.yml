{
  "appId": "com.dichza.app",
  "productName": "DichZa",
  "directories": {
    "buildResources": "build",
    "output": "dist"
  },
  "files": [
    "out/**/*"
  ],
  "extraResources": [
    "resources/**"
  ],
  "win": {
    "target": [
      {
        "target": "nsis",
        "arch": ["x64"]
      }
    ],
    "icon": "resources/icon.png",
    "artifactName": "${productName}-Setup-${version}.${ext}"
  },
  "nsis": {
    "oneClick": true,
    "perMachine": false,
    "allowToChangeInstallationDirectory": false,
    "deleteAppDataOnUninstall": false,
    "shortcutName": "DichZa"
  },
  "publish": [
    {
      "provider": "github",
      "owner": "nguyenhung1993",
      "repo": "DichZa"
    }
  ]
}
